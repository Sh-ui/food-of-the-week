<?xml version="1.0" encoding="UTF-8"?>
<!--
  cheffy-animated.svg -- PLACEHOLDER demo loop for the README. STUB / SCAFFOLD.
  Design contract: ../../CHEFFY-SYSTEM.md > Animated demo loop.
  Final art: a chef hat with named eye/mouth parts; loop blink -> look left ->
  look right -> idle, ~2-3s pause before restart. SMIL only, self-contained so it
  animates inline on GitHub. This placeholder just blinks to prove the pipeline.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Cheffy, a friendly chef hat">
  <!-- chef hat -->
  <path d="M60 90 q-30 -5 -28 -35 q0 -28 30 -28 q8 -22 38 -22 q30 0 38 22 q30 0 30 28 q2 30 -28 35 z"
        fill="#FAF8F3" stroke="#494331" stroke-width="4" stroke-linejoin="round"/>
  <!-- hat band -->
  <rect x="58" y="88" width="84" height="34" rx="8" fill="#F3CA40" stroke="#494331" stroke-width="4"/>
  <!-- face -->
  <g fill="#494331">
    <!-- eyes (blink) -->
    <circle cx="86" cy="62" r="5">
      <animate attributeName="ry" values="5;5;0.6;5;5" dur="3s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/>
    </circle>
    <circle cx="114" cy="62" r="5">
      <animate attributeName="ry" values="5;5;0.6;5;5" dur="3s" keyTimes="0;0.45;0.5;0.55;1" repeatCount="indefinite"/>
    </circle>
    <!-- smile -->
    <path d="M86 74 q14 12 28 0" fill="none" stroke="#494331" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
